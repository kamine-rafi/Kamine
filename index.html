<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamine AI</title>

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            🤖
            <h2>Kamine</h2>
        </div>

        <button id="newChat">
            + New Chat
        </button>

        <div id="history"></div>

        <div class="menu">

            <button>⚙ Settings</button>

            <button>👤 Owner</button>

        </div>

    </aside>

    <main class="main">

        <header>

            <h1>Kamine AI Assistant</h1>

            <p>Created by KM Rafi Chowdhury</p>

        </header>

        <div id="chat">

            <div class="ai message">

                👋 Welcome back.

                I'm Kamine AI Assistant.

            </div>

        </div>

        <div class="bottom">

            <button id="voiceBtn">🎤</button>

            <input
            id="msg"
            placeholder="Ask Kamine anything..."
            >

            <button onclick="send()">➤</button>

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
