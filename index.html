<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kamine AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <!-- Header -->
    <header class="header">

        <div class="logo">
            🤖 Kamine
        </div>

        <div class="status">
            ● Offline
        </div>

    </header>

    <!-- Chat -->
    <main id="chat" class="chat">

        <div class="message ai">
            👋 Welcome back, <b>Boss</b>.<br><br>
            I'm <b>Kamine</b>.<br>
            Offline Mode is Ready.
        </div>

    </main>

    <!-- Input -->
    <footer class="input-area">

        <button id="voiceBtn" class="icon-btn">
            🎤
        </button>

        <input
            id="msg"
            type="text"
            placeholder="Message Kamine..."
            autocomplete="off"
        >

        <button id="sendBtn" class="send-btn">
            ➤
        </button>

    </footer>

</div>

<!-- JavaScript -->

<script src="commands.js"></script>
<script src="owner.js"></script>
<script src="memory.js"></script>
<script src="voice.js"></script>
<script src="script.js"></script>

</body>
</html>
