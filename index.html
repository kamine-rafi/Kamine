<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamine AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ai-avatar-container">
    <img id="avatar" src="idle.gif" alt="AI Avatar">
</div>

<div class="app">
    <div class="input-area">
        <button id="voiceBtn" class="btn">🎤</button>
        <input id="msg" type="text" placeholder="Message Kamine...">
        <button id="sendBtn" class="btn">➤</button>
    </div>
</div>

<div id="owner-login-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; display: flex; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: #1e293b; padding: 20px; border-radius: 10px; color: white; text-align: center;">
        <h3>🔐 Owner Verification</h3>
        <input type="password" id="owner-pin" maxlength="4" placeholder="••••" style="padding: 10px; width: 150px; text-align: center; font-size: 20px;">
        <br>
        <button id="verify-pin-btn" style="padding: 10px 20px; margin-top: 10px;">Verify</button>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
