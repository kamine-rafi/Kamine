<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamine AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div id="splash-screen"><h1>Loading Kamine...</h1></div>

    <div id="owner-verification" style="display:none;">
        <div class="lock-box">
            <h3>🔒 Access Kamine</h3>
            <input type="password" id="pin-input" placeholder="Enter 4-Digit PIN" maxlength="4">
            <button onclick="verifyPin()" class="btn-primary">Verify PIN</button>
            <p>অথবা</p>
            <button onclick="loginWithGoogle()" class="btn-google">Sign in with Google</button>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div id="chat-container">
            <div id="chat-box"></div>
            <div class="input-area">
                <button onclick="startVoiceInput()" class="voice-btn">🎤</button>
                <input type="text" id="user-input" placeholder="Message Kamine...">
                <button onclick="sendMessage()" class="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
