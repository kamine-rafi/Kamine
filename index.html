<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamine AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #ai-avatar-container { text-align: center; margin: 15px 0; display: none; }
        #avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid #334155; }
        .splash-hide { opacity: 0; transition: 0.8s; pointer-events: none; }
    </style>
</head>
<body>

<div id="splash" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 2000;">
    <img src="logo.png" id="splashLogo" alt="Kamine Logo" style="width: 150px;">
</div>

<div class="app">
    <header class="header">
        <div class="logo">🤖 Kamine</div>
        <div id="user-info-area" style="display: flex; align-items: center; gap: 10px;">
            <img id="user-profile-pic" src="" alt="" style="width: 30px; height: 30px; border-radius: 50%; display: none;">
            <span id="user-name-display" style="font-size: 13px; color: #94a3b8; font-weight: bold;"></span>
            <button id="signout-btn" style="background: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; display: none;">Logout</button>
        </div>
        <div class="status">● Connected</div>
    </header>

    <div id="ai-avatar-container">
        <img id="avatar" src="idle.gif" alt="Kamine AI">
    </div>

    <main id="chat" class="chat">
        <div id="chat-area"></div>
    </main>

    <footer class="input-area">
        <button id="voiceBtn" class="icon-btn">🎤</button>
        <input id="msg" type="text" placeholder="Message Kamine..." autocomplete="off">
        <button id="sendBtn" class="send-btn">➤</button>
    </footer>
</div>

<div id="owner-login-modal" style="display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.96); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; gap: 20px;">
    <div style="background: #1e293b; padding: 25px; border-radius: 12px; text-align: center; color: white; width: 300px; border: 1px solid #334155;">
        <h3>🔐 Owner Verification</h3>
        <input type="password" id="owner-pin" maxlength="4" placeholder="••••" style="width: 100%; text-align: center; font-size: 24px; padding: 10px; margin: 15px 0; border-radius: 8px; border: none; background: #0f172a; color: white; letter-spacing: 5px;">
        <button id="verify-pin-btn" style="width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Verify PIN</button>
    </div>
    <div id="login-welcome-screen" style="background: #1e293b; padding: 20px; border-radius: 12px; text-align: center; color: white; width: 300px; border: 1px solid #334155;">
        <h4 style="margin: 0 0 5px 0;">🌐 Public Mode</h4>
        <button id="google-login-btn" style="width: 100%; padding: 12px; background: white; color: #1e293b; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" style="width: 18px;">
            Sign in with Google
        </button>
    </div>
</div> 

<script type="module" src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
