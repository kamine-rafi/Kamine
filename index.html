<script>
function send(){
    let input=document.getElementById("text");
    let chat=document.getElementById("chat");

    let msg=input.value.trim();
    if(msg=="") return;

    chat.innerHTML += "<div class='msg'>🧑 "+msg+"</div>";

    let reply="দুঃখিত, আমি এখনও এটা জানি না।";

    if(msg.toLowerCase()=="hi" || msg=="হাই"){
        reply="👋 হ্যালো! আমি Kamine.";
    }
    else if(msg=="তোমার নাম কি"){
        reply="🤖 আমার নাম Kamine AI.";
    }
    else if(msg=="কে বানিয়েছে"){
        reply="❤️ আমাকে KM Rafi Chowdhury বানিয়েছেন।";
    }
    else if(msg=="সময়"){
        reply="🕒 " + new Date().toLocaleTimeString();
    }
    else if(msg=="তারিখ"){
        reply="📅 " + new Date().toLocaleDateString();
    }

    chat.innerHTML += "<div class='msg'>🤖 "+reply+"</div>";

    input.value="";
    chat.scrollTop=chat.scrollHeight;
}
</script>
