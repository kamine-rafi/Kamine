<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kamine AI - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container">
        <h1>Welcome to Kamine AI</h1>
        <button id="owner-btn">Owner Mode (Secure)</button>
        <button id="public-btn">Public Mode (Google)</button>
    </div>

    <!-- মেইন চ্যাট ইন্টারফেস (লগইন ছাড়া লুকিয়ে থাকবে) -->
    <div id="chat-interface" style="display:none;">
        <div id="ai-avatar-container"><img id="avatar" src="idle.gif"></div>
        <div class="input-area">
            <button id="voiceBtn">🎤</button>
            <input id="msg" type="text" placeholder="Message Kamine...">
            <button id="sendBtn">➤</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
